  <line x1="42" y1="55" x2="58" y2="55" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="55" x2="50" y2="68" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
  <line x1="58" y1="55" x2="50" y2="68" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
  <line x1="50" y1="68" x2="38" y2="72" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
  <line x1="50" y1="68" x2="62" y2="72" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="55" x2="50" y2="42" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
  <line x1="58" y1="55" x2="50" y2="42" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
  <line x1="58" y1="55" x2="65" y2="62" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
  <line x1="65" y1="62" x2="62" y2="72" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
  <line x1="38" y1="72" x2="42" y2="55" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
