  <circle cx="58" cy="55" r="3" fill="#CC8800"/>
  <circle cx="50" cy="68" r="3" fill="#CC8800"/>
  <circle cx="38" cy="72" r="3" fill="#CC8800"/>
  <circle cx="62" cy="72" r="3" fill="#CC8800"/>
  <circle cx="50" cy="42" r="3" fill="#CC8800"/>
  <circle cx="65" cy="62" r="3" fill="#CC8800"/>
